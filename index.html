    if(b===0)visionScale=VS[l];

    if(b===3)reloadCooldownMult=RM[l];

function talentBuyTalent(id){

function talentDeselTalent(id){

    const clear=(br)=>{for(let x=0;x<LEVELS_PER_BRANCH;x++){const tid=br*LEVELS_PER_BRANCH+x;if(talentPurchased[tid]){talentPurchased[tid]=false;spentTalentPoints-=talentCost(br,x);}}};
    if(!talentPurchased[2*LEVELS_PER_BRANCH+2]){clear(3);clear(4);clear(5);}

    if(!talentPurchased[0*LEVELS_PER_BRANCH+2])clear(6);

function talentStatStr(b,l){
    const vs=["+5% view","+11% view","+18% view","+25% view","+33% view","+43% view","+54% view","+67% view"];
    const ss=["+15% accel","+30% accel","+50% accel","+75% accel","x2 accel","x2.5 accel","x3 accel","x4 accel"];
    const BImp=[1.5,2.5,3.5,4.5,6.0,7.5,9.0,11.0],BCD=[12000,8000,6000,4000,2500,1500,750,350];

    const ts=["150px map","165px map","180px map","195px map","210px map","225px map","240px map","255px map"];
    const tb=["CD 4.0s","CD 3.5s","CD 3.0s","CD 2.5s","CD 2.0s","CD 1.5s","CD 1.0s","CD 0.5s"];
    const sc=["1s / 10s CD","3s / 5s CD"];
    if(b===0)return vs[l];if(b===1)return ss[l];

function updateTalents(mjp,mjr){
    if(mouseDown&&mjp){
        talentDragActive=true;talentIsDragging=false;talentPressStartedHere=true;
        talentDragStartX=mouseX;talentDragStartY=mouseY;
        talentScrollBaseX=talentScrollX;talentScrollBaseY=talentScrollY;
    }
    if(mjr&&!talentIsDragging&&talentPressStartedHere){
        const bx=20,by=SCREEN_HEIGHT-BTN_SIZE-20,bw=BTN_SIZE,bh=BTN_SIZE;
        if(mouseX>=bx&&mouseX<=bx+bw&&mouseY>=by&&mouseY<=by+bh)page='LEVELS';
    }
    if(!mouseDown){talentDragActive=false;talentIsDragging=false;talentPressStartedHere=false;}
    if(talentDragActive){
        const dx=mouseX-talentDragStartX,dy=mouseY-talentDragStartY;
        if(!talentIsDragging&&(Math.abs(dx)>5||Math.abs(dy)>5))talentIsDragging=true;
        if(talentIsDragging){
            talentScrollX=talentScrollBaseX+dx;talentScrollY=talentScrollBaseY+dy;
            const minX=-(2650-SCREEN_WIDTH+250);
            if(talentScrollX>200)talentScrollX=200;
            if(talentScrollX<minX)talentScrollX=minX;
            if(talentScrollY<0)talentScrollY=0;
            if(talentScrollY>talentMaxScrollY())talentScrollY=talentMaxScrollY();
        }
    }
    talentHoveredId=-1;
    for(let i=0;i<TALENT_COUNT;i++){
        if(i%LEVELS_PER_BRANCH>=BRANCH_LEVELS[Math.floor(i/LEVELS_PER_BRANCH)])continue;
        const r=talentGetRect(i);
        if(mouseX>=r.x&&mouseX<=r.x+r.w&&mouseY>=r.y&&mouseY<=r.y+r.h)talentHoveredId=i;
    }
    const hForBuy=mouseDown&&!talentIsDragging&&talentHoveredId>=0&&talentCanBuy(talentHoveredId);
    const hForDes=mouseDown&&!talentIsDragging&&talentHoveredId>=0&&talentPurchased[talentHoveredId];
    if(hForBuy||hForDes){
        const isDesel=talentPurchased[talentHoveredId];
        if(talentHoldingId!==talentHoveredId||talentHoldingIsDesel!==isDesel){
            talentHoldingId=talentHoveredId;talentHoldStart=performance.now();
            talentHoldProgress=0;talentHoldingIsDesel=isDesel;
        }
        talentHoldProgress=(performance.now()-talentHoldStart)/600;
        if(talentHoldProgress>=1){
            if(talentHoldingIsDesel)talentDeselTalent(talentHoldingId);
            else talentBuyTalent(talentHoldingId);
            talentHoldingId=-1;talentHoldProgress=0;
        }
    }else{talentHoldingId=-1;talentHoldProgress=0;}
}
function renderTalents(ctx,btnSheet,greySheet,tintSheet,textSheet,iconsImg){

    ctx.beginPath();ctx.moveTo(0,barY);ctx.lineTo(SCREEN_WIDTH,barY);ctx.stroke();

        ctx.save();ctx.globalAlpha=120/255;ctx.strokeStyle='rgb(0,0,0)';
        ctx.lineWidth=12;ctx.lineCap='round';
        ctx.setLineDash(solid?[]:[12,24]);

    }

            const rL=talentGetRect(b*LEVELS_PER_BRANCH+lv);
            const rH=talentGetRect(b*LEVELS_PER_BRANCH+lv+1);
            const solid=talentPurchased[b*LEVELS_PER_BRANCH+lv]&&talentPurchased[b*LEVELS_PER_BRANCH+lv+1];
            thickLine(rL.x+rL.w/2,rL.y,rH.x+rH.w/2,rH.y+rH.h,solid);
        }
    }
    // Talent buttons
    for(let i=0;i<TALENT_COUNT;i++){
        if(i%LEVELS_PER_BRANCH>=BRANCH_LEVELS[Math.floor(i/LEVELS_PER_BRANCH)])continue;
        const r=talentGetRect(i);
        if(r.x+r.w<-BTN_SIZE||r.x>SCREEN_WIDTH+BTN_SIZE)continue;
        if(r.y+r.h<0||r.y>SCREEN_HEIGHT+BTN_SIZE)continue;
        const b=Math.floor(i/LEVELS_PER_BRANCH),l=i%LEVELS_PER_BRANCH;
        const purchased=talentPurchased[i],canBuy=talentCanBuy(i),hovered=(talentHoveredId===i);
        let expand=0;
        if(talentHoldingId===i){expand=Math.floor(Math.abs(Math.sin(performance.now()*Math.PI/270))*14);}
        else if(hovered)expand=5;
        const dr={x:r.x-expand,y:r.y-expand,w:r.w+expand*2,h:r.h+expand*2};
        const rowMap=[0,1,2,3,4,5,7,6,8];
        const row=rowMap[b];
        const sx=60,sy=row*20,sw=20,sh=20;
        if(!canBuy&&!purchased){
            if(greySheet){ctx.drawImage(greySheet,sx,sy,sw,sh,dr.x,dr.y,dr.w,dr.h);}
        }else{
            ctx.drawImage(purchased?tintSheet:btnSheet,sx,sy,sw,sh,dr.x,dr.y,dr.w,dr.h);
        }
        // Cost badge
        if(!purchased){
            const bw=40,bh=40;
            const bdx=dr.x+dr.w-bw+5,bdy=dr.y-5;
            ctx.save();ctx.imageSmoothingEnabled=false;
            if(!canBuy) ctx.filter='grayscale(1)';
            ctx.drawImage(iconsImg,0,24,8,8,bdx,bdy,bw,bh);
            ctx.restore();
            const cost=String(talentCost(b,l));
            const numScale=cost.length>=3?13/21:cost.length>=2?16/21:1;
            const cx=Math.floor(bdx+bw/2),cy=Math.floor(bdy+bh/2);
            ctx.save();ctx.translate(cx,cy);ctx.scale(numScale,numScale);
            const nw=cost.length*(4*3+3);
            renderText(ctx,textSheet,cost,Math.floor(-nw/2),-10,1);
            ctx.restore();
        }
    }
    // Tooltip
    if(talentHoveredId>=0){
        const b=Math.floor(talentHoveredId/LEVELS_PER_BRANCH),l=talentHoveredId%LEVELS_PER_BRANCH;
        const purchased=talentPurchased[talentHoveredId];
        const desc=talentBranchName(b);
        const stat=talentStatStr(b,l);
        let hint;
        if(purchased){
            let higherOwned=0;
            for(let x=l+1;x<LEVELS_PER_BRANCH;x++)if(talentPurchased[b*LEVELS_PER_BRANCH+x])higherOwned++;
            hint=higherOwned>0?'HOLD TO REFUND ('+(higherOwned+1)+' LEVELS)':'HOLD TO REFUND';
        }else if(talentCanBuy(talentHoveredId)){
            const ac=talentAutoBuyCount(talentHoveredId),tc=talentTotalCostToBuy(talentHoveredId);
            hint=ac>0?'HOLD TO BUY (+'+ac+' AUTO, '+tc+' TP)':'HOLD TO BUY';
        }else{
            const need=talentTotalCostToBuy(talentHoveredId)-(totalTalentPoints-spentTalentPoints);
            hint='NEED '+need+' MORE TP';
        }
        const ty=SCREEN_HEIGHT-210;
        const dw=desc.length*(4*3*2+3),sw2=stat.length*(4*3*2+3),hw=hint.length*(4*3+3);
        const padX=24,padY=14,boxW=Math.max(dw,Math.max(sw2,hw))+padX*2;
        // Rounded bg
        ctx.save();ctx.globalAlpha=180/255;ctx.fillStyle='rgb(0,0,0)';
        const bx2=SCREEN_WM-boxW/2,by2=ty-padY;
        ctx.beginPath();ctx.roundRect(bx2,by2,boxW,110+21+padY*2,12);ctx.fill();
        ctx.restore();
        renderText(ctx,textSheet,desc,SCREEN_WM-dw/2,ty,2,255,255,255);
        renderText(ctx,textSheet,stat,SCREEN_WM-sw2/2,ty+52,2,255,255,255);
        renderText(ctx,textSheet,hint,SCREEN_WM-hw/2,ty+110,1,255,255,255);
    }else{
        const dh='DRAG TO SCROLL';
        const dhw=dh.length*(4*3+3);
        renderText(ctx,textSheet,dh,SCREEN_WM-dhw/2,SCREEN_HEIGHT-110,1,255,255,255);
    }
    // Back button
    const bbx=20,bby=SCREEN_HEIGHT-BTN_SIZE-20,bbw=BTN_SIZE,bbh=BTN_SIZE;
    ctx.save();ctx.globalAlpha=80/255;ctx.filter='brightness(0)';
    ctx.drawImage(btnSheet,40,40,20,20,bbx-5,bby+5,bbw,bbh);ctx.restore();
    ctx.drawImage(btnSheet,40,40,20,20,bbx,bby,bbw,bbh);
    // TP display — rendered last so it sits above everything
    const tp=totalTalentPoints-spentTalentPoints;
    const tpStr='TP: '+tp;
    const tpW=tpStr.length*(4*3*2+3),tpH=7*3*2;
    const tpPadX=10,tpPadY=8;
    const tpBW=tpW+tpPadX*2,tpBH=tpH+tpPadY*2;
    const tpBX=SCREEN_WIDTH-tpBW-16,tpBY=SCREEN_HEIGHT-tpBH-16;
    ctx.save();ctx.globalAlpha=180/255;ctx.fillStyle='rgb(0,0,0)';
    ctx.beginPath();ctx.roundRect(tpBX,tpBY,tpBW,tpBH,8);ctx.fill();
    ctx.restore();
    renderText(ctx,textSheet,tpStr,tpBX+tpPadX,tpBY+tpPadY,2,255,255,255);
}

class Tile {
    constructor(){
        this.active=false; this.type="WALL";
        this.tileNum=1; this.tileType=1; this.rot=0;
        this.hitbox={x:0,y:0,w:TILE_SIZE,h:TILE_SIZE};
        this.initialX=0; this.initialY=0;
    }
    init(ix,iy){ this.initialX=ix; this.initialY=iy; this.hitbox={x:ix,y:iy,w:TILE_SIZE,h:TILE_SIZE}; }
    setTile(up,down,left,right,ul,ur,dl,dr){
        if(this.type==="ICE")       {this.tileNum=7; this.tileType=1;this.rot=0;return;}
        if(this.type==="START")     {this.tileNum=9; this.tileType=1;this.rot=0;return;}
        if(this.type==="END")       {this.tileNum=9; this.tileType=2;this.rot=0;return;}
        if(this.type==="KILL_BLOCK"){this.tileNum=10;this.tileType=1;this.rot=0;return;}
        if(this.type==="VOID")      {this.tileNum=10;this.tileType=2;this.rot=0;return;}
        if(this.type==="SPEED_UP")   {this.tileNum=11;this.tileType=1;this.rot=0;return;}
        if(this.type==="SPEED_LEFT") {this.tileNum=11;this.tileType=2;this.rot=0;return;}
        if(this.type==="SPEED_DOWN") {this.tileNum=11;this.tileType=3;this.rot=0;return;}
        if(this.type==="SPEED_RIGHT"){this.tileNum=11;this.tileType=4;this.rot=0;return;}
        if(this.type==="GRASS")      {this.tileNum=8; this.tileType=1;this.rot=0;return;}
        if(this.type!=="WALL"&&this.type!=="START_WALL") return;
        // Normalize: treat START_WALL same as WALL for neighbor matching
        const norm=(t)=>(t==="START_WALL")?"WALL":t;
        const sn=norm(this.type);
        up.active    = up.active    && norm(up.type)===sn;
        down.active  = down.active  && norm(down.type)===sn;
        left.active  = left.active  && norm(left.type)===sn;
        right.active = right.active && norm(right.type)===sn;
        ul.active = ul.active && norm(ul.type)===sn;
        ur.active = ur.active && norm(ur.type)===sn;
        dl.active = dl.active && norm(dl.type)===sn;
        dr.active = dr.active && norm(dr.type)===sn;
        const u=up.active,d=down.active,l=left.active,r=right.active;
        const UL=ul.active,UR=ur.active,DL=dl.active,DR=dr.active;
        if(!u&&!d&&!l&&!r){this.tileNum=1;this.tileType=1;this.rot=0;}
        else if(!u&&!d&&!l&& r){this.tileNum=2;this.tileType=1;this.rot=0;}
        else if(!u&&!d&& l&&!r){this.tileNum=2;this.tileType=1;this.rot=2;}
        else if(!u&& d&&!l&&!r){this.tileNum=2;this.tileType=1;this.rot=1;}
        else if( u&&!d&&!l&&!r){this.tileNum=2;this.tileType=1;this.rot=3;}
        else if( u&&!d&&!l&& r&& UR){this.tileNum=3;this.tileType=1;this.rot=0;}
        else if(!u&& d&&!l&& r&& DR){this.tileNum=3;this.tileType=1;this.rot=1;}
        else if(!u&& d&& l&&!r&& DL){this.tileNum=3;this.tileType=1;this.rot=2;}
        else if( u&&!d&& l&&!r&& UL){this.tileNum=3;this.tileType=1;this.rot=3;}
        else if( u&&!d&&!l&& r&&!UR){this.tileNum=3;this.tileType=2;this.rot=0;}
        else if(!u&& d&&!l&& r&&!DR){this.tileNum=3;this.tileType=2;this.rot=1;}
        else if(!u&& d&& l&&!r&&!DL){this.tileNum=3;this.tileType=2;this.rot=2;}
        else if( u&&!d&& l&&!r&&!UL){this.tileNum=3;this.tileType=2;this.rot=3;}
        else if(!u&&!d&& l&& r){this.tileNum=4;this.tileType=1;this.rot=0;}
        else if( u&& d&&!l&&!r){this.tileNum=4;this.tileType=1;this.rot=1;}
        else if( u&&!d&& l&& r&& UR&& UL){this.tileNum=5;this.tileType=1;this.rot=0;}
        else if( u&& d&&!l&& r&& UR&& DR){this.tileNum=5;this.tileType=1;this.rot=1;}
        else if(!u&& d&& l&& r&& DR&& DL){this.tileNum=5;this.tileType=1;this.rot=2;}
        else if( u&& d&& l&&!r&& DL&& UL){this.tileNum=5;this.tileType=1;this.rot=3;}
        else if( u&&!d&& l&& r&& UR&&!UL){this.tileNum=5;this.tileType=2;this.rot=0;}
        else if( u&& d&&!l&& r&&!UR&& DR){this.tileNum=5;this.tileType=2;this.rot=1;}
        else if(!u&& d&& l&& r&&!DR&& DL){this.tileNum=5;this.tileType=2;this.rot=2;}
        else if( u&& d&& l&&!r&&!DL&& UL){this.tileNum=5;this.tileType=2;this.rot=3;}
        else if( u&&!d&& l&& r&&!UR&& UL){this.tileNum=5;this.tileType=3;this.rot=0;}
        else if( u&& d&&!l&& r&& UR&&!DR){this.tileNum=5;this.tileType=3;this.rot=1;}
        else if(!u&& d&& l&& r&& DR&&!DL){this.tileNum=5;this.tileType=3;this.rot=2;}
        else if( u&& d&& l&&!r&& DL&&!UL){this.tileNum=5;this.tileType=3;this.rot=3;}
        else if( u&&!d&& l&& r&&!UR&&!UL){this.tileNum=5;this.tileType=4;this.rot=0;}
        else if( u&& d&&!l&& r&&!UR&&!DR){this.tileNum=5;this.tileType=4;this.rot=1;}
        else if(!u&& d&& l&& r&&!DR&&!DL){this.tileNum=5;this.tileType=4;this.rot=2;}
        else if( u&& d&& l&&!r&&!DL&&!UL){this.tileNum=5;this.tileType=4;this.rot=3;}
        else if(u&&d&&l&&r&& UL&& UR&& DL&& DR){this.tileNum=6;this.tileType=1;this.rot=0;}
        else if(u&&d&&l&&r&&!UL&& UR&& DL&& DR){this.tileNum=6;this.tileType=2;this.rot=0;}
        else if(u&&d&&l&&r&& UL&&!UR&& DL&& DR){this.tileNum=6;this.tileType=2;this.rot=1;}
        else if(u&&d&&l&&r&& UL&& UR&& DL&&!DR){this.tileNum=6;this.tileType=2;this.rot=2;}
        else if(u&&d&&l&&r&& UL&& UR&&!DL&& DR){this.tileNum=6;this.tileType=2;this.rot=3;}
        else if(u&&d&&l&&r&&!UL&&!UR&& DL&& DR){this.tileNum=6;this.tileType=3;this.rot=0;}
        else if(u&&d&&l&&r&& UL&&!UR&& DL&&!DR){this.tileNum=6;this.tileType=3;this.rot=1;}
        else if(u&&d&&l&&r&& UL&& UR&&!DL&&!DR){this.tileNum=6;this.tileType=3;this.rot=2;}
        else if(u&&d&&l&&r&&!UL&& UR&&!DL&& DR){this.tileNum=6;this.tileType=3;this.rot=3;}
        else if(u&&d&&l&&r&&!UL&&!UR&& DL&&!DR){this.tileNum=6;this.tileType=4;this.rot=0;}
        else if(u&&d&&l&&r&& UL&&!UR&&!DL&&!DR){this.tileNum=6;this.tileType=4;this.rot=1;}
        else if(u&&d&&l&&r&&!UL&& UR&&!DL&&!DR){this.tileNum=6;this.tileType=4;this.rot=2;}
        else if(u&&d&&l&&r&&!UL&&!UR&&!DL&& DR){this.tileNum=6;this.tileType=4;this.rot=3;}
        else if(u&&d&&l&&r&&!UL&&!UR&&!DL&&!DR){this.tileNum=6;this.tileType=5;this.rot=0;}
        else if(u&&d&&l&&r&& UL&&!UR&&!DL&& DR){this.tileNum=6;this.tileType=6;this.rot=0;}
        else if(u&&d&&l&&r&&!UL&& UR&& DL&&!DR){this.tileNum=6;this.tileType=6;this.rot=1;}
    }
    update(px,py){ this.hitbox.x=this.initialX-px; this.hitbox.y=this.initialY-py; }
    renderGround(ctx,sheet,showHitboxes){
        const hb=this.hitbox;
        if(!this.active||this.type==="WALL"||this.type==="START_WALL"||this.type==="KILL_BLOCK") return;
        if(hb.x>-hb.w-cullMarginX&&hb.y>-hb.h-cullMarginY&&hb.x<SCREEN_WIDTH+cullMarginX&&hb.y<SCREEN_HEIGHT+cullMarginY){
            const sx=(this.tileNum-1)*17,sy=(this.tileType-1)*17;
            const rx=Math.round(hb.x),ry=Math.round(hb.y);
            const cx=rx+hb.w/2,cy=ry+hb.h/2;
            ctx.save();ctx.translate(cx,cy);ctx.rotate(this.rot*Math.PI/2);
            ctx.drawImage(sheet,sx,sy,17,17,-hb.w/2-1,-hb.h/2-1,hb.w+2,hb.h+2);
            ctx.restore();
            if(showHitboxes){
                if(this.type==="ICE"  ){ctx.strokeStyle='rgb(255,255,0)';ctx.strokeRect(hb.x,hb.y,hb.w,hb.h);}
                if(this.type==="START"){ctx.strokeStyle='rgb(255,255,0)';ctx.strokeRect(hb.x,hb.y,hb.w,hb.h);}
                if(this.type==="END"  ){ctx.strokeStyle='rgb(255,255,0)';ctx.strokeRect(hb.x,hb.y,hb.w,hb.h);}
                if(this.type==="VOID" ){ctx.strokeStyle='rgb(128,0,255)';ctx.strokeRect(hb.x,hb.y,hb.w,hb.h);}
                if(this.type==="SPEED_UP"   ){ctx.strokeStyle='rgb(0,255,128)';ctx.strokeRect(hb.x,hb.y,hb.w,hb.h);}
                if(this.type==="SPEED_LEFT" ){ctx.strokeStyle='rgb(0,200,255)';ctx.strokeRect(hb.x,hb.y,hb.w,hb.h);}
                if(this.type==="SPEED_DOWN" ){ctx.strokeStyle='rgb(0,255,200)';ctx.strokeRect(hb.x,hb.y,hb.w,hb.h);}
                if(this.type==="SPEED_RIGHT"){ctx.strokeStyle='rgb(128,255,0)';ctx.strokeRect(hb.x,hb.y,hb.w,hb.h);}
                if(this.type==="GRASS"      ){ctx.strokeStyle='rgb(0,180,80)'; ctx.strokeRect(hb.x,hb.y,hb.w,hb.h);}
            }
        }
    }
    renderShadow(ctx){
        const hb=this.hitbox;
        if(!this.active||this.type!=="WALL"&&this.type!=="START_WALL"&&this.type!=="KILL_BLOCK") return;
        if(hb.x>-hb.w-cullMarginX&&hb.y>-hb.h-cullMarginY&&hb.x<SCREEN_WIDTH+cullMarginX&&hb.y<SCREEN_HEIGHT+cullMarginY){
            const rx=Math.round(hb.x),ry=Math.round(hb.y);
            ctx.save();ctx.globalAlpha=50/255;ctx.fillStyle='black';
            ctx.fillRect(rx-10,ry+10,hb.w,hb.h);
            ctx.restore();
        }
    }
    render(ctx,sheet,showHitboxes){
        const hb=this.hitbox;
        if(!this.active||this.type!=="WALL"&&this.type!=="START_WALL"&&this.type!=="KILL_BLOCK") return;
        if(hb.x>-hb.w-cullMarginX&&hb.y>-hb.h-cullMarginY&&hb.x<SCREEN_WIDTH+cullMarginX&&hb.y<SCREEN_HEIGHT+cullMarginY){
            const sx=(this.tileNum-1)*17,sy=(this.tileType-1)*17;
            const rx=Math.round(hb.x),ry=Math.round(hb.y);
            const cx=rx+hb.w/2,cy=ry+hb.h/2;
            ctx.save();ctx.translate(cx,cy);ctx.rotate(this.rot*Math.PI/2);
            ctx.drawImage(sheet,sx,sy,17,17,-hb.w/2,-hb.h/2,hb.w,hb.h);
            ctx.restore();
            if(showHitboxes){
                if(this.type==="WALL"      ){ctx.strokeStyle='rgb(255,0,0)';  ctx.strokeRect(hb.x,hb.y,hb.w,hb.h);}
                if(this.type==="START_WALL"){ctx.strokeStyle='rgb(255,128,0)';ctx.strokeRect(hb.x,hb.y,hb.w,hb.h);}
                if(this.type==="KILL_BLOCK"){ctx.strokeStyle='rgb(255,255,255)';ctx.strokeRect(hb.x,hb.y,hb.w,hb.h);}
            }
        }
    }
}

class Car {
    constructor(){
        this.xVel=0; this.yVel=0;
        this.drawDir=270;
        this.xPos=INITIAL_CAR_X;
        this.yPos=INITIAL_CAR_Y;
        this.visual={x:SCREEN_WM-Math.floor(CAR_WIDTH/2),y:SCREEN_HM-Math.floor(CAR_HEIGHT/2),w:CAR_WIDTH,h:CAR_HEIGHT};
        this.hitbox={x:SCREEN_WM-Math.floor(CAR_WIDTH/2),y:SCREEN_HM-Math.floor(CAR_HEIGHT/2),w:50,h:50};
        this.mouseX=0; this.mouseY=0;
    }
    reset(){
        this.xPos=INITIAL_CAR_X; this.yPos=INITIAL_CAR_Y;
        this.xVel=0; this.yVel=0; this.drawDir=270;
    }
    resize(){
        this.visual.x=SCREEN_WM-Math.floor(CAR_WIDTH/2);
        this.visual.y=SCREEN_HM-Math.floor(CAR_HEIGHT/2);
        this.hitbox.x=SCREEN_WM-Math.floor(CAR_WIDTH/2);
        this.hitbox.y=SCREEN_HM-Math.floor(CAR_HEIGHT/2);
    }
    updateMovement(mx,my,dt){
        const ox=mx-(SCREEN_WM-Math.floor(CAR_WIDTH/2));
        const oy=my-(SCREEN_HM-Math.floor(CAR_HEIGHT/2));
        let dx=ox/900, dy=oy/900;
        const accel=ACCELERATION*accelerationMult*(performance.now()<speedTileEnd?2.0:1.0);
        if(dx> accel) dx= accel;
        if(dy> accel) dy= accel;
        if(dx<-accel) dx=-accel;
        if(dy<-accel) dy=-accel;
        this.xVel+=dx*dt; this.yVel+=dy*dt;
        if(dx!==0||dy!==0) this.drawDir=Math.atan2(dy,dx)*180/Math.PI+90;
    }
    updatePosition(tiles,dt){
        // Second chance immunity timer
        if(secondChanceImmune&&performance.now()>=secondChanceImmunityEnd) secondChanceImmune=false;

        const hb=this.hitbox;
        const hbCx=SCREEN_WM-Math.floor(CAR_WIDTH/2);
        const hbCy=SCREEN_HM-Math.floor(CAR_HEIGHT/2);
        hb.x=hbCx; hb.y=hbCy;

        // Wall step-sweep (must run BEFORE tile checks so signX/Y are set)
        let xHit=false,yHit=false;
        const signX=Math.sign(this.xVel),signY=Math.sign(this.yVel);
        const xSteps=Math.ceil(Math.abs(this.xVel*dt));
        const ySteps=Math.ceil(Math.abs(this.yVel*dt));
        for(let s=0;s<xSteps;s++){
            hb.x+=signX;
            for(let i=0;i<TILE_GRID_HEIGHT;i++) for(let j=0;j<TILE_GRID_WIDTH;j++){
                const t=tiles[i][j];
                if(t.active&&(t.type==="WALL"||t.type==="START_WALL")&&hasIntersection(hb,t.hitbox)) xHit=true;
            }
        }
        hb.x=hbCx;
        for(let s=0;s<ySteps;s++){
            hb.y+=signY;
            for(let i=0;i<TILE_GRID_HEIGHT;i++) for(let j=0;j<TILE_GRID_WIDTH;j++){
                const t=tiles[i][j];
                if(t.active&&(t.type==="WALL"||t.type==="START_WALL")&&hasIntersection(hb,t.hitbox)) yHit=true;
            }
        }
        hb.x=hbCx; hb.y=hbCy;

        // ICE / END / SPEED / GRASS detection
        let onIce=false,anyGrass=false,allGrass=true;
        for(let i=0;i<TILE_GRID_HEIGHT;i++) for(let j=0;j<TILE_GRID_WIDTH;j++){
            const t=tiles[i][j];
            if(!hasIntersection(hb,t.hitbox)) continue;
            if(t.active&&(t.type==="ICE"||t.type==="SPEED_UP"||t.type==="SPEED_LEFT"||t.type==="SPEED_DOWN"||t.type==="SPEED_RIGHT")) onIce=true;
            if(t.active&&(t.type==="SPEED_UP"||t.type==="SPEED_LEFT"||t.type==="SPEED_DOWN"||t.type==="SPEED_RIGHT")) speedTileEnd=performance.now()+2000;
            if(t.active&&t.type==="GRASS") anyGrass=true; else allGrass=false;
            if(t.active&&t.type==="END"&&!finish){
                finish=true; finishTick=performance.now();
                finishTime=(finishTick-gameStartTime-3000)/1000;
                const dcRewards=[1,5,10,100];
                driftCoins+=dcRewards[currentLevel]||0;
                dbSaveProfile();
                dbSaveTime(currentLevel,finishTime);
            }
        }

        // Kill block
        const resetCar=()=>{
            this.xPos=INITIAL_CAR_X;this.yPos=INITIAL_CAR_Y;this.xVel=0;this.yVel=0;
            finish=false;gameStartTime=performance.now();startWallDeactivated=false;boostOverriding=false;particles=[];countdownGoEnd=0;
            for(let r=0;r<TILE_GRID_HEIGHT;r++) for(let c=0;c<TILE_GRID_WIDTH;c++)
                if(tiles[r][c].type==="START_WALL") tiles[r][c].active=true;
        };
        let killBlockHit=false;
        for(let i=0;i<TILE_GRID_HEIGHT&&!killBlockHit;i++) for(let j=0;j<TILE_GRID_WIDTH&&!killBlockHit;j++){
            const t=tiles[i][j];
            if(t.active&&t.type==="KILL_BLOCK"&&hasIntersection(hb,t.hitbox)){
                killBlockHit=true;
                if(secondChanceUnlocked&&!secondChanceImmune&&performance.now()>=secondChanceCooldownEnd){
                    secondChanceImmune=true;
                    const imMs=(secondChanceLevel>=2)?3000:1000;
                    secondChanceImmunityEnd=performance.now()+imMs;
                    secondChanceImmunityTotal=imMs;
                    const scCD=(secondChanceLevel>=2)?5000:10000;
                    secondChanceCooldownEnd=secondChanceImmunityEnd+scCD;
                    secondChanceTotalDuration=scCD;
                }else if(!secondChanceImmune){resetCar();}
                if(secondChanceImmune){
                    const inter=rectIntersect(hb,t.hitbox);
                    if(inter){
                        if(inter.w<=inter.h){
                            if(hb.x<t.hitbox.x){this.xPos-=inter.w;this.xVel=-Math.abs(this.xVel)*0.15;}
                            else{this.xPos+=inter.w;this.xVel=Math.abs(this.xVel)*0.15;}
                        }else{
                            if(hb.y<t.hitbox.y){this.yPos-=inter.h;this.yVel=-Math.abs(this.yVel)*0.15;}
                            else{this.yPos+=inter.h;this.yVel=Math.abs(this.yVel)*0.15;}
                        }
                    }
                }
            }
        }

        // Void + void background
        {
            let anyVoid=false,allVoid=true,anyActiveTile=false;
            for(let i=0;i<TILE_GRID_HEIGHT;i++) for(let j=0;j<TILE_GRID_WIDTH;j++)
                if(hasIntersection(hb,tiles[i][j].hitbox)){
                    if(tiles[i][j].active){
                        anyActiveTile=true;
                        if(tiles[i][j].type==="VOID") anyVoid=true;
                        else allVoid=false;
                    } else { allVoid=false; }
                }
            if((anyVoid&&allVoid)||!anyActiveTile){
                if(secondChanceUnlocked&&!secondChanceImmune&&performance.now()>=secondChanceCooldownEnd){
                    secondChanceImmune=true;
                    const imMs=(secondChanceLevel>=2)?3000:1000;
                    secondChanceImmunityEnd=performance.now()+imMs;
                    secondChanceImmunityTotal=imMs;
                    const scCD=(secondChanceLevel>=2)?5000:10000;
                    secondChanceCooldownEnd=secondChanceImmunityEnd+scCD;
                    secondChanceTotalDuration=scCD;
                }else if(!secondChanceImmune){resetCar();}
            }
        }

        // Friction
        const onGrass=anyGrass&&allGrass;
        const ff=onGrass?0.91:onIce?FRICTION:0.9;
        this.xVel*=Math.pow(ff,dt); this.yVel*=Math.pow(ff,dt);
        if(Math.abs(this.xVel)<0.05) this.xVel=0;
        if(Math.abs(this.yVel)<0.05) this.yVel=0;

        // Wall bounce with direction check + dampener
        const wallBounceCoeffs=[0.35,0.20,0.10,0.03,0.0,0,0,0];
        const bounceCoeff=(wallDampenerUnlocked&&wallDampenerLevel>=1)?wallBounceCoeffs[wallDampenerLevel-1]:0.4;
        if(xHit&&this.xVel*signX>0) this.xVel*=-bounceCoeff;
        if(yHit&&this.yVel*signY>0) this.yVel*=-bounceCoeff;

        // Speed cap (suspended while boost override is active)
        const spd=Math.sqrt(this.xVel*this.xVel+this.yVel*this.yVel);
        if(boostOverriding&&spd<=35) boostOverriding=false;
        if(!boostOverriding&&spd>35){this.xVel=this.xVel/spd*35;this.yVel=this.yVel/spd*35;}

        // Position update
        this.xPos+=this.xVel*dt; this.yPos+=this.yVel*dt;

        // Pushout pass (resolve wall penetration using new position)
        const cHB={x:SCREEN_WM-Math.floor(CAR_WIDTH/2),y:SCREEN_HM-Math.floor(CAR_HEIGHT/2),w:50,h:50};
        for(let pi=0;pi<TILE_GRID_HEIGHT;pi++) for(let pj=0;pj<TILE_GRID_WIDTH;pj++){
            const t=tiles[pi][pj];
            if(!t.active||t.type!=="WALL"&&t.type!=="START_WALL") continue;
            const tHB={x:t.initialX-Math.floor(this.xPos),y:t.initialY-Math.floor(this.yPos),w:TILE_SIZE,h:TILE_SIZE};
            const inter=rectIntersect(cHB,tHB);
            if(inter){
                if(inter.w<=inter.h){
                    if(cHB.x<tHB.x){this.xPos-=inter.w;if(this.xVel>0)this.xVel=0;}
                    else{this.xPos+=inter.w;if(this.xVel<0)this.xVel=0;}
                }else{
                    if(cHB.y<tHB.y){this.yPos-=inter.h;if(this.yVel>0)this.yVel=0;}
                    else{this.yPos+=inter.h;if(this.yVel<0)this.yVel=0;}
                }
            }
        }
    }
    update(mx,my,tiles,dt,sjp,rmp){
        // Refill double charge (per-slot)
        if(doubleChargeUnlocked) boost2ChargesLeft=boost2CooldownEnds.filter(e=>performance.now()>=e).length;
        // Boost (shift)
        if(boostUnlocked&&sjp){
            const primaryReady=performance.now()>=boostCooldownEnd;
            const extraReady=doubleChargeUnlocked&&boost2ChargesLeft>0;
            if(primaryReady||extraReady){
                const bx2=mx-SCREEN_WM,by2=my-SCREEN_HM;
                const blen=Math.sqrt(bx2*bx2+by2*by2);
                if(blen>1){
                    const BImp=[1.5,2.5,3.5,4.5,6.0,7.5,9.0,11.0];
                    const BCD=[12000,8000,6000,4000,2500,1500,750,350];
                    const imp=(boostLevel>=1&&boostLevel<=8)?BImp[boostLevel-1]:5;
                    const cd=Math.floor(((boostLevel>=1&&boostLevel<=8)?BCD[boostLevel-1]:8000)*reloadCooldownMult);
                    this.xVel+=(bx2/blen)*imp; this.yVel+=(by2/blen)*imp;
                    boostOverriding=true;
                    {const pnow=performance.now();
                    const bNx=-(bx2/blen),bNy=-(by2/blen);
                    for(let _i=0;_i<22;_i++){
                        const a=(Math.random()-0.5)*Math.PI*(Math.random()<0.4?1.1:0.7);
                        const ca=Math.cos(a),sa=Math.sin(a);
                        const pdx=bNx*ca-bNy*sa,pdy=bNx*sa+bNy*ca;
                        const isSmoke=Math.random()<0.35;
                        const spd=isSmoke?(1+Math.random()*3):(4+Math.random()*8);
                        particles.push({
                            wx:this.xPos+SCREEN_WM+bNx*32,
                            wy:this.yPos+SCREEN_HM+bNy*32,
                            vx:pdx*spd,vy:pdy*spd,
                            born:pnow,
                            life:isSmoke?(600+Math.random()*500):(200+Math.random()*250),
                            size:isSmoke?(7+Math.random()*8):(3+Math.random()*4),
                            smoke:isSmoke
                        });
                    }}
                    if(primaryReady){boostCooldownEnd=performance.now()+cd;boostCooldownTotal=cd;}
                    else{
                        const crm=[1.0,0.9,0.8,0.7,1.0,0.9,0.8,0.7];
                        const mult=(doubleChargeLevel>=1&&doubleChargeLevel<=8)?crm[doubleChargeLevel-1]:1;
                        const cdVal=cd*mult;
                        const slot=boost2CooldownEnds.findIndex(e=>performance.now()>=e);
                        if(slot>=0){boost2CooldownEnds[slot]=performance.now()+cdVal;boost2CooldownTotals[slot]=cdVal;}
                    }
                }
            }
        }
        // Turbo Brake (right mouse)
        if(turboBrakeUnlocked&&rmp&&performance.now()>=turboBrakeCooldownEnd){
            const cds=[4000,3500,3000,2500,2000,1500,1000,500];
            const cd=(turboBrakeLevel>=1&&turboBrakeLevel<=8)?cds[turboBrakeLevel-1]:4000;
            this.xVel=0; this.yVel=0;
            turboBrakeCooldownEnd=performance.now()+cd;turboBrakeCooldownTotal=cd;
        }
        this.updateMovement(mx,my,dt); this.updatePosition(tiles,dt); this.mouseX=mx; this.mouseY=my;
    }
    render(ctx,carImg,showHitboxes){
        const visW=CAR_WIDTH,visH=CAR_HEIGHT;
        const visX=SCREEN_WM-Math.floor(visW/2),visY=SCREEN_HM-Math.floor(visH/2);
        const sOff=5,pivY=10;
        const scx=visX-sOff+visW/2, scy=visY+sOff+visH/2-pivY;
        ctx.save();
        ctx.globalAlpha=50/255;
        ctx.filter='brightness(0)';
        ctx.translate(scx,scy);
        ctx.rotate(this.drawDir*Math.PI/180);
        ctx.drawImage(carImg,-visW/2,-(visH/2-pivY),visW,visH);
        ctx.restore();
        const cx=visX+visW/2, cy=visY+visH/2-pivY;
        ctx.save();
        ctx.translate(cx,cy);
        ctx.rotate(this.drawDir*Math.PI/180);
        ctx.drawImage(carImg,-visW/2,-(visH/2-pivY),visW,visH);
        ctx.restore();
        if(showHitboxes){
            const hb=this.hitbox;
            ctx.strokeStyle='rgb(255,0,0)';
            ctx.strokeRect(hb.x,hb.y,hb.w,hb.h);
            const hcx=hb.x+hb.w/2, hcy=hb.y+hb.h/2;
            ctx.strokeStyle='rgb(0,0,255)';
            ctx.beginPath();
            ctx.moveTo(hcx,hcy);
            ctx.lineTo(this.mouseX,this.mouseY);
            ctx.stroke();
            if(this.xVel!==0||this.yVel!==0){
                const mouseLen=Math.sqrt((this.mouseX-hcx)**2+(this.mouseY-hcy)**2);
                const velLen=Math.sqrt(this.xVel*this.xVel+this.yVel*this.yVel);
                ctx.strokeStyle='rgb(0,255,255)';
                ctx.beginPath();
                ctx.moveTo(hcx,hcy);
                ctx.lineTo(hcx+(this.xVel/velLen)*mouseLen,hcy+(this.yVel/velLen)*mouseLen);
                ctx.stroke();
            }
        }
    }
}

class Background {
    constructor(){
        this.bgType=1;
        this.initCarX=INITIAL_CAR_X;
        this.initCarY=INITIAL_CAR_Y;
        this.bw=0; this.bh=0; this.rects=[];
        this.rebuild();
    }
    setType(t){
        this.bgType=t;
        this.initCarX=INITIAL_CAR_X;
        this.initCarY=INITIAL_CAR_Y;
    }
    rebuild(){
        this.initCarX=INITIAL_CAR_X;
        this.initCarY=INITIAL_CAR_Y;
        const minVS=0.60;
        this.extraX=Math.ceil(SCREEN_WM*(1/minVS-1)/TILE_SIZE)+2;
        this.extraY=Math.ceil(SCREEN_HM*(1/minVS-1)/TILE_SIZE)+2;
        this.bw=Math.ceil(SCREEN_WIDTH/TILE_SIZE)+1+2*this.extraX;
        this.bh=Math.ceil(SCREEN_HEIGHT/TILE_SIZE)+1+2*this.extraY;
        this.rects=[];
        for(let i=0;i<this.bh;i++){
            this.rects[i]=[];
            for(let j=0;j<this.bw;j++)
                this.rects[i][j]={x:(j-this.extraX)*TILE_SIZE,y:(i-this.extraY)*TILE_SIZE,w:TILE_SIZE,h:TILE_SIZE};
        }
    }
    update(px,py){
        const offX=((Math.trunc(px-this.initCarX)%TILE_SIZE)+TILE_SIZE)%TILE_SIZE;
        const offY=((Math.trunc(py-this.initCarY)%TILE_SIZE)+TILE_SIZE)%TILE_SIZE;
        for(let i=0;i<this.bh;i++)
            for(let j=0;j<this.bw;j++){
                this.rects[i][j].x=(j-this.extraX)*TILE_SIZE-offX;
                this.rects[i][j].y=(i-this.extraY)*TILE_SIZE-offY;
            }
    }
    render(ctx,sheet){
        const srcX=this.bgType===2?9*17:7*17,srcY=this.bgType===2?17:0;
        for(let i=0;i<this.bh;i++)
            for(let j=0;j<this.bw;j++){
                const r=this.rects[i][j];
                ctx.drawImage(sheet,srcX,srcY,17,17,r.x-2,r.y-2,r.w+4,r.h+4);
            }
    }
}

class MenuBackground {
    constructor(){
        this.gridW=0; this.gridH=0; this.grid=[];
        this.scrollX=0; this.scrollY=0;
        this.rebuild();
    }
    rebuild(){
        this.gridW=Math.ceil(SCREEN_WIDTH/TILE_SIZE)+1;
        this.gridH=Math.ceil(SCREEN_HEIGHT/TILE_SIZE)+1;
        this.grid=[];
        for(let i=0;i<this.gridH;i++){
            this.grid[i]=[];
            for(let j=0;j<this.gridW;j++)
                this.grid[i][j]={x:j*TILE_SIZE,y:i*TILE_SIZE,w:TILE_SIZE,h:TILE_SIZE};
        }
    }
    update(dt){
        this.scrollX-=1.5*dt; this.scrollY-=1.5*dt;
        const ox=((Math.trunc(this.scrollX)%TILE_SIZE)+TILE_SIZE)%TILE_SIZE;
        const oy=((Math.trunc(this.scrollY)%TILE_SIZE)+TILE_SIZE)%TILE_SIZE;
        for(let i=0;i<this.gridH;i++)
            for(let j=0;j<this.gridW;j++){
                this.grid[i][j].x=j*TILE_SIZE-ox;
                this.grid[i][j].y=i*TILE_SIZE-oy;
            }
    }
    render(ctx,sheet){
        for(let i=0;i<this.gridH;i++)
            for(let j=0;j<this.gridW;j++){
                const r=this.grid[i][j];
                ctx.drawImage(sheet,7*17,0,17,17,r.x-2,r.y-2,r.w+4,r.h+4);
            }
    }
}

function renderText(ctx,textSheet,text,x,y,size,cr,cg,cb){
    if(size===undefined) size=2;
    const hasColor=cr!==undefined;
    if(cr===undefined) cr=0;
    if(cg===undefined) cg=0;
    if(cb===undefined) cb=0;
    const chars=[];
    let xCur=0;
    for(let i=0;i<text.length;i++){
        const ch=text[i];
        let col=0,row=0,w=4,h=7;
        // Uppercase A-Z
        if(ch==='A'){col=1;}  if(ch==='B'){col=2;}  if(ch==='C'){col=3;}
        if(ch==='D'){col=4;}  if(ch==='E'){col=5;}  if(ch==='F'){col=6;}
        if(ch==='G'){col=7;}  if(ch==='H'){col=8;}  if(ch==='I'){col=9;}
        if(ch==='J'){col=10;} if(ch==='K'){col=11;} if(ch==='L'){col=12;}
        if(ch==='M'){col=13;w=5;} if(ch==='N'){col=14;} if(ch==='O'){col=15;}
        if(ch==='P'){col=16;} if(ch==='Q'){col=17;} if(ch==='R'){col=18;}
        if(ch==='S'){col=19;} if(ch==='T'){col=20;} if(ch==='U'){col=21;}
        if(ch==='V'){col=22;w=5;} if(ch==='W'){col=23;w=5;} if(ch==='X'){col=24;}
        if(ch==='Y'){col=25;} if(ch==='Z'){col=26;}
        // Lowercase a-z (row 8; g/p/q have h=10)
        if(ch==='a'){col=1;row=8;}  if(ch==='b'){col=2;row=8;}  if(ch==='c'){col=3;row=8;}
        if(ch==='d'){col=4;row=8;}  if(ch==='e'){col=5;row=8;}  if(ch==='f'){col=6;row=8;}
        if(ch==='g'){col=7;row=8;h=10;} if(ch==='h'){col=8;row=8;} if(ch==='i'){col=9;row=8;}
        if(ch==='j'){col=10;row=8;} if(ch==='k'){col=11;row=8;} if(ch==='l'){col=12;row=8;}
        if(ch==='m'){col=13;row=8;w=5;} if(ch==='n'){col=14;row=8;} if(ch==='o'){col=15;row=8;}
        if(ch==='p'){col=16;row=8;h=10;} if(ch==='q'){col=17;row=8;h=10;} if(ch==='r'){col=18;row=8;}
        if(ch==='s'){col=19;row=8;} if(ch==='t'){col=20;row=8;} if(ch==='u'){col=21;row=8;}
        if(ch==='v'){col=22;row=8;w=5;} if(ch==='w'){col=23;row=8;w=5;} if(ch==='x'){col=24;row=8;}
        if(ch==='y'){col=25;row=8;h=10;} if(ch==='z'){col=26;row=8;}
        // Digits
        if(ch==='1'){col=1;row=18;} if(ch==='2'){col=2;row=18;} if(ch==='3'){col=3;row=18;}
        if(ch==='4'){col=4;row=18;} if(ch==='5'){col=5;row=18;} if(ch==='6'){col=6;row=18;}
        if(ch==='7'){col=7;row=18;} if(ch==='8'){col=8;row=18;} if(ch==='9'){col=9;row=18;}
        if(ch==='0'){col=10;row=18;}
        // Punctuation
        if(ch==='?'){col=1;row=26;} if(ch==='!'){col=2;row=26;} if(ch==='.'){col=3;row=26;}
        if(ch===','){col=4;row=26;} if(ch===':'){col=5;row=26;} if(ch===';'){col=6;row=26;}
        if(ch==='*'){col=7;row=26;}
        if(ch==='-'){col=8;row=26;} if(ch==='('){col=9;row=26;} if(ch===')'){col=10;row=26;}
        if(col===0){xCur+=4*3*size+3;continue;}
        chars.push({col,row,w,h,cx:xCur});
        xCur+=w*3*size+3;
    }
    if(!hasColor){
        for(const c of chars){
            ctx.drawImage(textSheet,(c.col-1)*5,c.row,c.w,c.h,x+c.cx,y,c.w*3*size,c.h*3*size);
        }
    }else{
        const totalW=Math.max(1,xCur),totalH=Math.max(1,10*3*size);
        const tmp=document.createElement('canvas');
        tmp.width=totalW;tmp.height=totalH;
        const tc=tmp.getContext('2d');
        tc.imageSmoothingEnabled=false;
        for(const c of chars){
            tc.drawImage(textSheet,(c.col-1)*5,c.row,c.w,c.h,c.cx,0,c.w*3*size,c.h*3*size);
        }
        tc.globalCompositeOperation='source-in';
        tc.fillStyle=`rgb(${cr},${cg},${cb})`;
        tc.fillRect(0,0,totalW,totalH);
        ctx.drawImage(tmp,x,y);
    }
}

function renderTextButton(ctx,sheet,textSheet,srcY,btnX,btnY,btnW,label,cr,cg,cb,textOffsetY){
    const SC=5,SRC_H=16,BTN_H=SRC_H*SC; // 80px tall
    const CAP_SW=2,MID_SW=36,CAP_W=CAP_SW*SC,MID_TW=MID_SW*SC;
    const midW=btnW-CAP_W*2;
    function drawParts(dx,dy){
        ctx.drawImage(sheet,0,srcY,CAP_SW,SRC_H,dx,dy,CAP_W,BTN_H);
        let drawn=0;
        while(drawn<midW){
            const dw=Math.min(MID_TW,midW-drawn);
            ctx.drawImage(sheet,CAP_SW,srcY,Math.ceil(dw/SC),SRC_H,dx+CAP_W+drawn,dy,dw,BTN_H);
            drawn+=dw;
        }
        ctx.drawImage(sheet,CAP_SW+MID_SW,srcY,CAP_SW,SRC_H,dx+btnW-CAP_W,dy,CAP_W,BTN_H);
    }
    ctx.save();ctx.globalAlpha=80/255;ctx.filter='brightness(0)';ctx.imageSmoothingEnabled=false;
    drawParts(btnX-5,btnY+5);
    ctx.restore();
    ctx.save();ctx.imageSmoothingEnabled=false;
    drawParts(btnX,btnY);
    ctx.restore();
    if(mouseX>=btnX&&mouseX<=btnX+btnW&&mouseY>=btnY&&mouseY<=btnY+BTN_H){
        ctx.save();ctx.globalAlpha=0.25;ctx.fillStyle='white';ctx.fillRect(btnX,btnY,btnW,BTN_H);ctx.restore();
    }
    if(label){
        const lw=label.length*(4*3*2+3);
        renderText(ctx,textSheet,label,Math.floor(btnX+btnW/2-lw/2),btnY+BTN_H/2-14+(textOffsetY||0),2,cr??0,cg??0,cb??0);
    }
}

function renderButton(ctx,btnSheet,textSheet,type,bx,by,bw,bh,text){
    let sx=0,sy=0,sw=40,sh=20;
    if(type===2){sx=40;sy=0;sw=20;sh=20;}
    if(type===3){sx=40;sy=20;sw=20;sh=20;}
    if(type===4){sx=40;sy=40;sw=20;sh=20;}
    if(type===5){sx=40;sy=60;sw=20;sh=20;}
    if(type===6){sx=40;sy=80;sw=20;sh=20;}
    if(type===7){sx=40;sy=100;sw=20;sh=20;}
    if(type===8){sx=40;sy=120;sw=20;sh=20;}
    if(type===9){sx=40;sy=140;sw=20;sh=20;}
    // Shadow
    ctx.save();
    ctx.globalAlpha=80/255;
    ctx.filter='brightness(0)';
    ctx.drawImage(btnSheet,sx,sy,sw,sh,bx-5,by+5,bw,bh);
    ctx.restore();
    // Button
    ctx.save();ctx.imageSmoothingEnabled=false;
    ctx.drawImage(btnSheet,sx,sy,sw,sh,bx,by,bw,bh);
    ctx.restore();
    if(mouseX>=bx&&mouseX<=bx+bw&&mouseY>=by&&mouseY<=by+bh){
        ctx.save();ctx.globalAlpha=0.25;ctx.fillStyle='white';ctx.fillRect(bx,by,bw,bh);ctx.restore();
    }
    // Text
    if(text&&text.length>0){
        const size=2;
        const charW=4,charH=7;
        const tw=text.length*(charW*3*size+3);
        const th=charH*3*size;
        const tx=bx+bw/2-tw/2,ty=by+bh/2-th/2;
        renderText(ctx,textSheet,text,tx,ty,size);
    }
}

function renderDriftCoins(ctx,textSheet,iconsImg){
    const numStr=String(driftCoins);
    const scale=2,step=4*3*scale+3,iconSz=60,gap=9,padX=12,padY=9;
    const textW=numStr.length*step;
    const innerH=Math.max(iconSz,7*3*scale);
    const bgW=iconSz+gap+textW+padX*2,bgH=innerH+padY*2;
    const bgX=SCREEN_WIDTH-bgW-18,bgY=18;
    ctx.save();ctx.globalAlpha=180/255;ctx.fillStyle='rgb(0,0,0)';
    ctx.beginPath();ctx.roundRect(bgX,bgY,bgW,bgH,9);ctx.fill();ctx.restore();
    const iconX=bgX+padX,iconY=bgY+padY+Math.floor((innerH-iconSz)/2);
    ctx.save();ctx.imageSmoothingEnabled=false;
    ctx.drawImage(iconsImg,0,0,12,12,iconX,iconY,iconSz,iconSz);
    ctx.restore();
    renderText(ctx,textSheet,numStr,bgX+padX+iconSz+gap,bgY+padY+Math.floor((innerH-7*3*scale)/2),scale,255,255,255);
}

async function dbLoadProfile(uid){
    const{data}=await db.from('profiles').select('*').eq('id',uid).single();
    if(!data)return;
    currentUsername=data.username||'';
    driftCoins=data.drift_coins||0;
    totalTalentPoints=data.total_talent_points||0;
    spentTalentPoints=data.spent_talent_points||0;
    talentPurchased=Array.isArray(data.talents_purchased)&&data.talents_purchased.length===TALENT_COUNT
        ?data.talents_purchased:new Array(TALENT_COUNT).fill(false);
    if(isDeveloper(currentUsername)) totalTalentPoints=Math.max(totalTalentPoints,1000);
    if(isAdmin(currentUsername)){totalTalentPoints=Math.max(totalTalentPoints,300);driftCoins=Math.max(driftCoins,500);}

}

function joinLobbyChannel(){
    if(lobbyChannel)return;
    const key=currentUser?.id||'anon-'+Math.random().toString(36).slice(2);
    lobbyChannel=db.channel('ice-drift-lobby',{config:{presence:{key}}});
    lobbyChannel
        .on('broadcast',{event:'pos'},({payload})=>{
            if(payload.uid===currentUser?.id)return;
            otherPlayers[payload.uid]={x:payload.x,y:payload.y,dir:payload.dir||270,username:payload.username||'',ts:performance.now()};
        })
        .on('presence',{event:'leave'},({leftPresences})=>{
            for(const p of leftPresences)delete otherPlayers[p.key];
        })
        .subscribe(async(status)=>{
            if(status==='SUBSCRIBED')await lobbyChannel.track({uid:currentUser?.id||key});
        });
}
function leaveLobbyChannel(){
    if(!lobbyChannel)return;
    lobbyChannel.unsubscribe();
    lobbyChannel=null;
    otherPlayers={};
}
function toAuthEmail(username){return username.toLowerCase().replace(/[^a-z0-9._-]/g,'_')+'@icedrift.com';}
async function dbSignUp(username,password){
    authLoading=true;authError='';
    try{
        if(!/^[a-zA-Z0-9_]{3,20}$/.test(username)){authLoading=false;authError='Username: 3-20 chars, letters, numbers, _';return;}
        const{data:existing}=await db.from('profiles').select('id').ilike('username',username).maybeSingle();
        if(existing){authLoading=false;authError='Username already taken';return;}
        const{data,error}=await db.auth.signUp({email:toAuthEmail(username),password});
        if(error){authLoading=false;authError=error.message;return;}
        if(!data.user){authLoading=false;authError='Disable email confirmation in Supabase auth settings';return;}
        const ins=await db.from('profiles').insert({
            id:data.user.id,username,
            drift_coins:0,total_talent_points:0,spent_talent_points:0,talents_purchased:[]
        });
        if(ins.error){authLoading=false;authError='DB error: '+ins.error.message;return;}
        currentUser=data.user;currentUsername=username;
        authLoading=false;showPassword=false;
        page='LEVELS';dbLoadRecords();
    }catch(e){authLoading=false;authError='Error: '+e.message;}
}
async function dbSignIn(username,password){
    authLoading=true;authError='';
    try{
        const{data,error}=await db.auth.signInWithPassword({email:toAuthEmail(username),password});
        if(error){authLoading=false;authError='Invalid username or password';return;}
        currentUser=data.user;
        await dbLoadProfile(data.user.id);
        authLoading=false;showPassword=false;
        page='LEVELS';dbLoadRecords();
    }catch(e){authLoading=false;authError='Error: '+e.message;}
}

function syncHidden(field){
    const el=field==='username'?hiddenUN:hiddenPW;
    el.value=inputValues[field];
    el.setSelectionRange(caretPos,caretPos);
}
function setActiveInput(field){
    activeInput=field;
    if(field===null){hiddenUN.blur();hiddenPW.blur();canvas.style.transform='';return;}
    const el=field==='username'?hiddenUN:hiddenPW;
    el.value=inputValues[field];
    caretPos=inputValues[field].length;
    el.setSelectionRange(caretPos,caretPos);
    el.focus();
    setTimeout(applyKbShift,350);
}

hiddenUN.addEventListener('keydown',e=>{

});
document.addEventListener('keydown',e=>{
    if(activeInput!==null){
        e.preventDefault();
        const val=inputValues[activeInput];
        if(e.key==='ArrowLeft'){if(caretPos>0)caretPos--;}
        else if(e.key==='ArrowRight'){if(caretPos<val.length)caretPos++;}
        else if(e.key==='Home'){caretPos=0;}
        else if(e.key==='End'){caretPos=val.length;}
        else if(e.key==='Backspace'){
            if(caretPos>0){inputValues[activeInput]=val.slice(0,caretPos-1)+val.slice(caretPos);caretPos--;syncHidden(activeInput);}
        } else if(e.key==='Delete'){
            if(caretPos<val.length){inputValues[activeInput]=val.slice(0,caretPos)+val.slice(caretPos+1);syncHidden(activeInput);}
        } else if(e.key==='Tab'){setActiveInput(activeInput==='username'?'password':'username');}
        else if(e.key==='Enter'){authSubmitPending=true;}
        else if(e.key.length===1&&val.length<32){
            inputValues[activeInput]=val.slice(0,caretPos)+e.key+val.slice(caretPos);
            caretPos++;syncHidden(activeInput);
        }
        return;
    }
    if(e.key==='Shift'){if(!shiftWasDown){shiftJustPressed=true;shiftWasDown=true;}}
    if(e.key==='Alt'){showHitboxes=true;}
    if((e.key==='r'||e.key==='R')&&page==='GAME'){levelLoaded=false;}
});
document.addEventListener('keyup',e=>{
    if(e.key==='Shift') shiftWasDown=false;
    if(e.key==='Alt') showHitboxes=false;
});

function charStep(ch,scale){
    const w=(ch==='M'||ch==='m'||ch==='V'||ch==='v'||ch==='W'||ch==='w')?5:4;
    return w*3*scale+3;
}
function getCaretXOffset(text,pos,scale){
    let x=0;
    for(let i=0;i<pos&&i<text.length;i++) x+=charStep(text[i],scale);
    return x;
}
function getCaretPosFromX(text,relX,scale){
    let x=0;
    for(let i=0;i<text.length;i++){
        const step=charStep(text[i],scale);
        if(relX<x+step/2) return i;
        x+=step;
    }
    return text.length;
}
function applyKbShift(){
    if(!window.visualViewport) return;
    const kbOpen=window.visualViewport.height<window.innerHeight-100;
    if(kbOpen&&(page==='LOGIN'||page==='CREATE')&&activeInput&&authFieldRects){
        const field=activeInput==='username'?authFieldRects.un:authFieldRects.pw;
        if(field){
            const fieldBottom=((field.y+field.h)*gameScale+gameOffY)/dpr+30;
            const shift=Math.max(0,fieldBottom-window.visualViewport.height);
            canvas.style.transform=shift>0?`translateY(-${Math.round(shift)}px)`:'';
            return;
        }
    }
    canvas.style.transform='';
}
if(window.visualViewport) window.visualViewport.addEventListener('resize',applyKbShift);

// Loading screen
(()=>{
    // Background gradient
    const bg=ctx.createRadialGradient(canvas.width/2,canvas.height/2,0,canvas.width/2,canvas.height/2,Math.max(canvas.width,canvas.height)*0.8);
    bg.addColorStop(0,'#0a1628');bg.addColorStop(1,'#000408');
    ctx.fillStyle=bg;ctx.fillRect(0,0,canvas.width,canvas.height);

    // Ice crystal lines radiating from corners and center
    ctx.save();ctx.strokeStyle='rgba(100,180,255,0.07)';ctx.lineWidth=1;
    const pts=[[0,0],[canvas.width,0],[0,canvas.height],[canvas.width,canvas.height],[canvas.width/2,canvas.height/2]];
    for(const [ox,oy] of pts){
        for(let a=0;a<Math.PI*2;a+=Math.PI/8){
            ctx.beginPath();ctx.moveTo(ox,oy);
            ctx.lineTo(ox+Math.cos(a)*canvas.width,oy+Math.sin(a)*canvas.height);
            ctx.stroke();
        }
    }
    ctx.restore();

    // Snowflake shapes scattered
    ctx.save();ctx.strokeStyle='rgba(140,210,255,0.12)';ctx.lineWidth=1.5;
    function snowflake(x,y,r){
        for(let a=0;a<Math.PI*2;a+=Math.PI/3){
            const cx=x+Math.cos(a)*r,cy=y+Math.sin(a)*r;
            ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(cx,cy);ctx.stroke();
            ctx.beginPath();ctx.moveTo(cx,cy);
            ctx.lineTo(cx+Math.cos(a+Math.PI/6)*r*0.4,cy+Math.sin(a+Math.PI/6)*r*0.4);ctx.stroke();
            ctx.beginPath();ctx.moveTo(cx,cy);
            ctx.lineTo(cx+Math.cos(a-Math.PI/6)*r*0.4,cy+Math.sin(a-Math.PI/6)*r*0.4);ctx.stroke();
        }
    }
    const flakes=[[0.15,0.2,60],[0.85,0.15,45],[0.08,0.75,50],[0.92,0.8,40],[0.5,0.12,35],[0.75,0.6,30]];
    for(const[fx,fy,fr] of flakes) snowflake(canvas.width*fx,canvas.height*fy,fr);
    ctx.restore();
    const cw=canvas.width,ch=canvas.height,cwm=cw/2,chm=ch/2;

    // Title
    ctx.save();
    ctx.font=`bold ${Math.floor(ch*0.13)}px monospace`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(60,130,220,0.18)';ctx.fillText('ICE DRIFT',cwm+4,chm-ch*0.15+4);
    const titleGrad=ctx.createLinearGradient(cwm-200,chm-110,cwm+200,chm-50);
    titleGrad.addColorStop(0,'#a8d8ff');titleGrad.addColorStop(0.5,'#ffffff');titleGrad.addColorStop(1,'#7ec8e3');
    ctx.fillStyle=titleGrad;ctx.fillText('ICE DRIFT',cwm,chm-ch*0.15);
    ctx.restore();

    // Loading bar track
    const barW=Math.min(400,cw*0.5),barH=6,barX=cwm-barW/2,barY=chm+20;
    ctx.save();ctx.globalAlpha=0.25;ctx.fillStyle='#4488aa';
    ctx.beginPath();ctx.roundRect(barX,barY,barW,barH,3);ctx.fill();
    const fillGrad=ctx.createLinearGradient(barX,0,barX+barW*0.6,0);
    fillGrad.addColorStop(0,'#5bc8ff');fillGrad.addColorStop(1,'#a8eeff');
    ctx.globalAlpha=1;ctx.fillStyle=fillGrad;
    ctx.beginPath();ctx.roundRect(barX,barY,barW*0.6,barH,3);ctx.fill();
    ctx.restore();

    // Loading text
    ctx.save();ctx.font='18px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(160,210,255,0.7)';ctx.fillText('Loading textures...',cwm,chm+50);
    ctx.restore();
})();

    function doSetTile(i,j){
        const make=(r,c)=>{
            if(r<0||r>=TILE_GRID_HEIGHT||c<0||c>=TILE_GRID_WIDTH) return {active:false,type:"N/A"};
            return {active:tiles[r][c].active, type:tiles[r][c].type};
        };
        tiles[i][j].setTile(
            make(i-1,j),make(i+1,j),make(i,j-1),make(i,j+1),
            make(i-1,j-1),make(i-1,j+1),make(i+1,j-1),make(i+1,j+1)
        );
    }

    function loadLevel(){
        const map=LEVEL_MAPS[currentLevel];
        for(let i=0;i<TILE_GRID_HEIGHT;i++){
            for(let j=0;j<TILE_GRID_WIDTH;j++){
                const v=map[i][j];
                if(v===1){tiles[i][j].active=true;tiles[i][j].type="WALL";}
                else if(v===2){tiles[i][j].active=true;tiles[i][j].type="ICE";}
                else if(v===3){tiles[i][j].active=true;tiles[i][j].type="START";}
                else if(v===4){tiles[i][j].active=true;tiles[i][j].type="END";}
                else if(v===5){tiles[i][j].active=true;tiles[i][j].type="START_WALL";}
                else if(v===6){tiles[i][j].active=true;tiles[i][j].type="KILL_BLOCK";}
                else if(v===7){tiles[i][j].active=true;tiles[i][j].type="VOID";}
                else if(v===8) {tiles[i][j].active=true;tiles[i][j].type="SPEED_UP";}
                else if(v===9) {tiles[i][j].active=true;tiles[i][j].type="SPEED_LEFT";}
                else if(v===10){tiles[i][j].active=true;tiles[i][j].type="SPEED_DOWN";}
                else if(v===11){tiles[i][j].active=true;tiles[i][j].type="SPEED_RIGHT";}
                else if(v===12){tiles[i][j].active=true;tiles[i][j].type="GRASS";}
                else{tiles[i][j].active=false;tiles[i][j].type="";}
            }
        }
        for(let i=0;i<TILE_GRID_HEIGHT;i++)
            for(let j=0;j<TILE_GRID_WIDTH;j++)
                doSetTile(i,j);
    }

            bg.update(player.xPos,player.yPos);

            // Broadcast own position
            {const now=performance.now();
            if(currentUser&&now-lastLobbyBroadcast>50){
                lastLobbyBroadcast=now;
                lobbyChannel?.send({type:'broadcast',event:'pos',payload:{uid:currentUser.id,x:player.xPos+SCREEN_WM,y:player.yPos+SCREEN_HM,dir:player.drawDir,username:currentUsername}});
            }}

            // Remove stale other players
            {const now=performance.now();
            for(const uid of Object.keys(otherPlayers)){
                if(now-otherPlayers[uid].ts>5000)delete otherPlayers[uid];
            }}

            cullMarginX=Math.max(0,SCREEN_WM*(1/visionScale-1));
            cullMarginY=Math.max(0,SCREEN_HM*(1/visionScale-1));
            ctx.fillStyle='rgb(0,0,0)';ctx.fillRect(0,0,SCREEN_WIDTH,SCREEN_HEIGHT);
            ctx.save();
            ctx.translate(SCREEN_WM,SCREEN_HM);
            ctx.scale(visionScale,visionScale);
            ctx.translate(-SCREEN_WM,-SCREEN_HM);
            bg.render(ctx,sheet);
            for(let i=0;i<TILE_GRID_HEIGHT;i++)
                for(let j=0;j<TILE_GRID_WIDTH;j++)
                    tiles[i][j].renderGround(ctx,sheet,false);
            for(let i=0;i<TILE_GRID_HEIGHT;i++)
                for(let j=0;j<TILE_GRID_WIDTH;j++)
                    tiles[i][j].renderShadow(ctx);
            {const isWall=t=>t.active&&t.type==="WALL";
            ctx.save();ctx.globalAlpha=50/255;ctx.fillStyle='black';
            for(let i=0;i<TILE_GRID_HEIGHT-1;i++)
                for(let j=0;j<TILE_GRID_WIDTH-1;j++){
                    if(!isWall(tiles[i][j])||!isWall(tiles[i+1][j+1])||isWall(tiles[i][j+1]))continue;
                    const hb=tiles[i][j].hitbox;
                    if(hb.x>-hb.w-cullMarginX&&hb.y>-hb.h-cullMarginY&&hb.x<SCREEN_WIDTH+cullMarginX&&hb.y<SCREEN_HEIGHT+cullMarginY)
                        ctx.fillRect(Math.round(hb.x)+hb.w-10,Math.round(hb.y)+hb.h,10,10);
                }
            ctx.restore();}
            for(let i=0;i<TILE_GRID_HEIGHT;i++)
                for(let j=0;j<TILE_GRID_WIDTH;j++)
                    tiles[i][j].render(ctx,sheet,false);
            // Boost particles
            {const pnow=performance.now();
            particles=particles.filter(p=>pnow-p.born<p.life);
            for(const p of particles){
                const t=(pnow-p.born)/p.life;
                p.wx+=p.vx*dt;p.wy+=p.vy*dt;
                p.vx*=Math.pow(p.smoke?0.90:0.85,dt);
                p.vy*=Math.pow(p.smoke?0.90:0.85,dt);
                const sx=p.wx-player.xPos,sy=p.wy-player.yPos;
                ctx.save();
                ctx.globalAlpha=(1-t)*(p.smoke?0.55:0.85);
                if(p.smoke){const v=Math.floor(60+t*60);ctx.fillStyle=`rgb(${v},${v},${v})`;}
                else{const r=255,g=Math.floor(200*(1-t*t)),b=0;ctx.fillStyle=`rgb(${r},${g},${b})`;}
                const radius=p.size*(1+t*0.6);
                ctx.beginPath();ctx.arc(sx,sy,radius,0,Math.PI*2);ctx.fill();
                ctx.restore();
            }}
            // Other players
            {const sOff=5,pivY=10,visW=CAR_WIDTH,visH=CAR_HEIGHT;
            for(const[uid,op]of Object.entries(otherPlayers)){
                const sx=op.x-player.xPos;
                const sy=op.y-player.yPos;
                const dir=(op.dir||270)*Math.PI/180;
                // Shadow
                ctx.save();ctx.globalAlpha=50/255;ctx.filter='brightness(0)';
                ctx.translate(sx-sOff,sy+sOff-pivY);ctx.rotate(dir);
                ctx.drawImage(carImg,-visW/2,-(visH/2-pivY),visW,visH);
                ctx.restore();
                // Car texture
                ctx.save();ctx.translate(sx,sy-pivY);ctx.rotate(dir);
                ctx.drawImage(carImg,-visW/2,-(visH/2-pivY),visW,visH);
                ctx.restore();
                // Name label
                if(op.username){
                    const nm=op.username.toUpperCase();
                    const nw=nm.length*(4*3+3),padX=8,padY=5;
                    const lx=Math.floor(sx-nw/2-padX),ly=Math.floor(sy-visH/2-pivY-7*3-padY*2-6);
                    ctx.save();ctx.globalAlpha=0.8;ctx.fillStyle='rgb(0,0,0)';
                    ctx.beginPath();ctx.roundRect(lx,ly,nw+padX*2,7*3+padY*2,4);ctx.fill();ctx.restore();
                    renderText(ctx,textSheet,nm,lx+padX,ly+padY,1,255,255,255);
                }
            }}
            player.render(ctx,carImg,false);
            ctx.restore();

            // Self username label
            if(currentUsername){
                const nm=currentUsername.toUpperCase();
                const nw=nm.length*(4*3+3),padX=8,padY=5;
                const lx=Math.floor(SCREEN_WM-nw/2-padX),ly=Math.floor(SCREEN_HM-CAR_HEIGHT/2-10-7*3-padY*2-6);
                ctx.save();ctx.globalAlpha=0.75;ctx.fillStyle='rgb(0,30,80)';
                ctx.beginPath();ctx.roundRect(lx,ly,nw+padX*2,7*3+padY*2,4);ctx.fill();ctx.restore();
                renderText(ctx,textSheet,nm,lx+padX,ly+padY,1,180,220,255);
            }
            // HUD cooldown indicators
            {const hn=performance.now();
            const HX=20,HSTEP=68,SC=5;
            const IW=17,IH=12,SW=12,SH=12,GAP=1;
            function cdStateL(endT,total){if(hn>=endT)return 0;return Math.min(20,Math.floor(((endT-hn)/total)*20));}
            function hudSpriteL(y,iconRow,state,stateSheet=cdSheet){
                ctx.drawImage(cdSheet,0,iconRow*IH,IW,IH,HX,y,IW*SC,IH*SC);
                ctx.drawImage(stateSheet,IW+GAP,state*SH,SW,SH,HX+IW*SC,y,SW*SC,SH*SC);
            }
            let ny=20;
            if(boostUnlocked){
                hudSpriteL(ny,0,cdStateL(boostCooldownEnd,boostCooldownTotal));ny+=HSTEP;
                if(doubleChargeUnlocked){for(let s=0;s<boost2CooldownEnds.length;s++){hudSpriteL(ny,1,cdStateL(boost2CooldownEnds[s],boost2CooldownTotals[s]));ny+=HSTEP;}}
            }
            if(turboBrakeUnlocked){hudSpriteL(ny,2,cdStateL(turboBrakeCooldownEnd,turboBrakeCooldownTotal));ny+=HSTEP;}
            if(secondChanceUnlocked){
                if(secondChanceImmune)hudSpriteL(ny,3,cdStateL(secondChanceImmunityEnd,secondChanceImmunityTotal),cdImmuneSheet);
                else hudSpriteL(ny,3,cdStateL(secondChanceCooldownEnd,secondChanceTotalDuration));
            }}
            // Speed tile glow
            if(performance.now()<speedTileEnd){
                const grd=ctx.createRadialGradient(SCREEN_WM,SCREEN_HM,Math.min(SCREEN_WIDTH,SCREEN_HEIGHT)*0.15,SCREEN_WM,SCREEN_HM,Math.max(SCREEN_WIDTH,SCREEN_HEIGHT)*0.75);
                grd.addColorStop(0,'rgba(0,255,80,0)');
                grd.addColorStop(0.5,'rgba(0,255,80,0.5)');
                grd.addColorStop(1,'rgba(0,255,80,0.9)');
                ctx.fillStyle=grd;ctx.fillRect(0,0,SCREEN_WIDTH,SCREEN_HEIGHT);
            }
            // LOBBY label
            {const lbl='LOBBY',lw=lbl.length*(4*3*2+3);
            ctx.save();ctx.globalAlpha=0.7;
            renderText(ctx,textSheet,lbl,Math.floor(SCREEN_WM-lw/2),10,2,255,255,255);
            ctx.restore();}
            renderButton(ctx,btnSheet,textSheet,4,lobbyBb.bx,lobbyBb.by,lobbyBb.bw,lobbyBb.bh,'');
        }

        requestAnimationFrame(loop);
    }
    loop();
}).catch(err=>{
    console.error(err);
    ctx.fillStyle='#222'; ctx.fillRect(0,0,SCREEN_WIDTH,SCREEN_HEIGHT);
    ctx.fillStyle='#f66'; ctx.font='24px monospace';
    const lines=(err.stack||err.toString()).split('\n');
    lines.forEach((l,i)=>ctx.fillText(l.slice(0,90),40,80+i*30));
});
</script>
</body>
</html>
